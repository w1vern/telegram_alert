services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-alert}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alert}
      POSTGRES_DB: ${DB_NAME:-alert}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alert} -d ${DB_NAME:-alert}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:


