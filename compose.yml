services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-alert}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alert}
      POSTGRES_DB: ${DB_NAME:-alert}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alert} -d ${DB_NAME:-alert}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command:
      ["uv", "run", "--no-dev", "alembic",
       "-c", "telegram_alert/migrations/alembic.ini", "upgrade", "head"]
    restart: "no"

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
