# Alembic configuration.
#
# The database URL is NOT set here on purpose: it is built at runtime from the
# application settings (see env.py -> get_settings().db.dsn) so there is a
# single source of truth for connection details (.env).
#
# Paths below are relative to the current directory, so always invoke alembic
# from the repo root (the Makefile and the Docker WORKDIR both do).

[alembic]
script_location = telegram_alert/migrations
prepend_sys_path = .
# Use a timestamped, slugged filename so migrations sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[post_write_hooks]
# (optional) run a formatter on newly generated migrations; left disabled.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
